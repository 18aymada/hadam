{% extends "core/base.html" %}

{% block content %}

<h2>Create Account</h2>

<form method="post">
    {% csrf_token %}

    <div>
        <label>Username</label>
        {{ form.username }}
    </div>

    <div>
        <label>Password</label>
        {{ form.password1 }}
    </div>

    <div>
        <label>Confirm Password</label>
        {{ form.password2 }}
    </div>

    <button type="submit">Register</button>
</form>

<p>
    Already have an account?
    <a href="/login/">Login here</a>
</p>

{% endblock %}
