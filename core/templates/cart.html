{% extends 'base.html' %}

{% block content %}

<h1>Your Cart 🛒</h1>

{% for p in products %}
<div>
    <h3>{{ p.name }}</h3>
    <a href="{% url 'remove_from_cart' p.id %}">Remove</a>
</div>
{% empty %}
<p>Cart is empty</p>
{% endfor %}

<form method="POST" action="{% url 'checkout' %}">
    {% csrf_token %}
    <button type="submit">Checkout 💳</button>
</form>

{% endblock %}
