{% extends 'core/base.html' %}

{% block content %}

<h1>Products</h1>

{% for p in products %}
    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>{{ p.name }}</h3>
        <p>{{ p.description }}</p>
        <p><b>${{ p.price }}</b></p>

        <a href="/add/{{ p.id }}/">Add to Cart</a>
    </div>
{% endfor %}

{% endblock %}
